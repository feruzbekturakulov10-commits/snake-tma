<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>🐍 Змейка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

  :root{
    --green:#00ff88;
    --green2:#00cc66;
    --green3:#008844;
    --dark:#080812;
    --dark2:#0d0d1e;
    --dark3:#12122a;
    --red:#ff3355;
    --gold:#ffd700;
  }

  body{
    background:var(--dark);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    min-height:100vh; overflow:hidden;
    font-family:'Press Start 2P', monospace;
    color:var(--green);
    touch-action:none;
  }

  #hud{
    width:100%; max-width:420px;
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 14px;
    background:var(--dark2);
    border-bottom:2px solid var(--green3);
    font-size:10px;
  }
  #hud .fruit-icon{font-size:18px; line-height:1;}
  #score-val{color:#fff; font-size:11px;}
  #best-val{color:#888; font-size:9px;}

  #canvas-wrap{
    position:relative;
    width:100%; max-width:420px;
    flex:1; display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }

  canvas{
    display:block;
    image-rendering:pixelated;
    background:var(--dark);
  }

  /* Overlay экраны */
  .overlay{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:rgba(4,4,16,0.88);
    gap:18px;
    transition:opacity .3s;
  }
  .overlay.hidden{display:none;}

  .overlay h1{
    font-size:clamp(18px,5vw,28px);
    color:var(--green);
    text-shadow:0 0 20px var(--green);
    text-align:center; line-height:1.6;
  }
  .overlay p{font-size:9px; color:#778; text-align:center; line-height:2;}

  .btn{
    padding:12px 28px;
    background:var(--green3);
    color:#fff; font-family:inherit;
    font-size:10px; border:2px solid var(--green);
    cursor:pointer; border-radius:4px;
    box-shadow:0 0 16px var(--green3);
    transition:all .15s;
    letter-spacing:1px;
  }
  .btn:active{transform:scale(0.95); background:var(--green2);}

  .fruit-showcase{display:flex; flex-wrap:wrap; justify-content:center; gap:10px; max-width:300px;}
  .fruit-item{display:flex; flex-direction:column; align-items:center; gap:4px; font-size:22px;}
  .fruit-item span{font-size:7px; color:#667;}

  /* Мобильный джойстик */
  #dpad{
    width:100%; max-width:420px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(2,1fr);
    gap:6px; padding:10px 14px 14px;
    background:var(--dark2);
    border-top:2px solid var(--green3);
  }
  .dpad-btn{
    background:var(--dark3);
    border:1.5px solid #223;
    border-radius:6px;
    color:var(--green);
    font-size:20px;
    display:flex; align-items:center; justify-content:center;
    padding:10px; cursor:pointer;
    transition:background .1s;
    user-select:none;
  }
  .dpad-btn:active, .dpad-btn.pressed{background:#1a2a1a; border-color:var(--green3);}
  .dpad-btn.empty{visibility:hidden;}
  #btn-up   {grid-column:2; grid-row:1;}
  #btn-left {grid-column:1; grid-row:2;}
  #btn-down {grid-column:2; grid-row:2;}
  #btn-right{grid-column:3; grid-row:2;}

  #score-popup{
    position:absolute;
    font-size:13px;
    color:var(--gold);
    text-shadow:0 0 8px var(--gold);
    pointer-events:none;
    font-family:'Press Start 2P',monospace;
    opacity:0;
    transition:opacity .1s;
  }
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="fruit-icon" id="current-fruit-icon">🍎</div>
    <div>
      <div style="color:#555;font-size:7px;margin-bottom:3px;">СЧЁТ</div>
      <div id="score-val">0</div>
    </div>
  </div>
  <div style="text-align:right;">
    <div style="color:#555;font-size:7px;margin-bottom:3px;">РЕКОРД</div>
    <div id="best-val">0</div>
  </div>
</div>

<!-- Игровое поле -->
<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="score-popup">+2</div>

  <!-- Стартовый экран -->
  <div class="overlay" id="screen-start">
    <h1>🐍<br>ЗМЕЙКА</h1>
    <div class="fruit-showcase" id="fruit-showcase"></div>
    <p>Собирай фрукты<br>Избегай стен и себя</p>
    <button class="btn" id="btn-start">▶ ИГРАТЬ</button>
  </div>

  <!-- Экран смерти -->
  <div class="overlay hidden" id="screen-dead">
    <h1 style="color:var(--red);text-shadow:0 0 20px var(--red);">КОНЕЦ!</h1>
    <div style="font-size:9px;color:#aaa;">СЧЁТ: <span id="final-score" style="color:#fff;">0</span></div>
    <div id="new-record" style="color:var(--gold);font-size:9px;display:none;">🏆 НОВЫЙ РЕКОРД!</div>
    <button class="btn" id="btn-restart">↺ ЕЩЁ РАЗ</button>
  </div>
</div>

<!-- D-Pad -->
<div id="dpad">
  <div class="dpad-btn empty"></div>
  <div class="dpad-btn" id="btn-up">▲</div>
  <div class="dpad-btn empty"></div>
  <div class="dpad-btn" id="btn-left">◀</div>
  <div class="dpad-btn" id="btn-down">▼</div>
  <div class="dpad-btn" id="btn-right">▶</div>
</div>

<script>
// ── Telegram WebApp init ────────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if(tg){ tg.ready(); tg.expand(); tg.setHeaderColor('#080812'); }

// ── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const CELL = 20;
let COLS, ROWS, W, H;

function resizeCanvas(){
  const wrap = document.getElementById('canvas-wrap');
  const maxW = Math.min(wrap.clientWidth, 420);
  COLS = Math.floor(maxW / CELL);
  ROWS = Math.floor(wrap.clientHeight / CELL);
  W = COLS * CELL; H = ROWS * CELL;
  canvas.width = W; canvas.height = H;
}
resizeCanvas();
window.addEventListener('resize', ()=>{ resizeCanvas(); });

// ── Фрукты ───────────────────────────────────────────────────────────────────
const FRUITS = [
  {icon:'🍎', pts:1, color:'#cc2222', glow:'#3a0808'},
  {icon:'🍌', pts:1, color:'#ffdd00', glow:'#3a2800'},
  {icon:'🥝', pts:2, color:'#5a9a20', glow:'#0a1a06'},
  {icon:'🍇', pts:2, color:'#8822bb', glow:'#1a0828'},
  {icon:'🍓', pts:1, color:'#dd1133', glow:'#2a0810'},
  {icon:'🍊', pts:1, color:'#ff7700', glow:'#2a1400'},
  {icon:'🍉', pts:2, color:'#228822', glow:'#0a2008'},
  {icon:'🍋', pts:1, color:'#ffdd00', glow:'#2a2200'},
  {icon:'🍑', pts:1, color:'#ffaa66', glow:'#2a1206'},
  {icon:'🫐', pts:2, color:'#334499', glow:'#080820'},
];

// Витрина фруктов на стартовом экране
const showcase = document.getElementById('fruit-showcase');
FRUITS.forEach(f=>{
  const d = document.createElement('div');
  d.className='fruit-item';
  d.innerHTML=`<span style="font-size:22px">${f.icon}</span><span>+${f.pts}</span>`;
  showcase.appendChild(d);
});

// ── Состояние игры ────────────────────────────────────────────────────────────
let snake, dir, nextDir, food, fruitObj, score, bestScore=0;
let gameRunning=false, animId=null, lastTime=0;
const SPEED=130; // мс

function startGame(){
  resizeCanvas();
  snake=[{x:Math.floor(COLS/2), y:Math.floor(ROWS/2)}];
  dir={x:1,y:0}; nextDir={x:1,y:0};
  score=0;
  spawnFood();
  updateHUD();
  gameRunning=true;
  lastTime=0;
  cancelAnimationFrame(animId);
  loop(0);
}

function spawnFood(){
  fruitObj = FRUITS[Math.floor(Math.random()*FRUITS.length)];
  document.getElementById('current-fruit-icon').textContent=fruitObj.icon;
  let pos;
  do{ pos={x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
  food=pos;
}

function updateHUD(){
  document.getElementById('score-val').textContent=score;
  document.getElementById('best-val').textContent=bestScore;
}

// ── Игровой цикл ──────────────────────────────────────────────────────────────
function loop(ts){
  animId=requestAnimationFrame(loop);
  if(ts-lastTime < SPEED) return;
  lastTime=ts;
  tick();
  render();
}

function tick(){
  dir={...nextDir};
  const head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  // Стена
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){ gameOver(); return; }
  // Себя
  if(snake.slice(0,-1).some(s=>s.x===head.x&&s.y===head.y)){ gameOver(); return; }

  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score+=fruitObj.pts;
    showPopup(food.x*CELL+CELL/2, food.y*CELL, '+'+fruitObj.pts);
    spawnFood();
    updateHUD();
  } else {
    snake.pop();
  }
}

// ── Рендер ────────────────────────────────────────────────────────────────────
function render(){
  // Фон
  ctx.fillStyle='#080812';
  ctx.fillRect(0,0,W,H);

  // Сетка
  ctx.strokeStyle='#0e0e22'; ctx.lineWidth=0.5;
  for(let x=0;x<W;x+=CELL){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=CELL){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  drawFood();
  drawSnake();
}

function drawFood(){
  const cx=food.x*CELL+CELL/2, cy=food.y*CELL+CELL/2;
  const pulse=0.5+0.5*Math.sin(Date.now()*0.005);
  const r=CELL*0.42+pulse*2;

  // Свечение
  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,r+8);
  grd.addColorStop(0, fruitObj.color+'88');
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(cx,cy,r+8,0,Math.PI*2); ctx.fill();

  // Фрукт эмодзи
  ctx.font=`${Math.round(r*1.7)}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(fruitObj.icon, cx, cy+1);
}

function drawSnake(){
  const n=snake.length;
  if(n<1) return;

  // Строим путь по центрам
  const pts=snake.map(s=>({x:s.x*CELL+CELL/2, y:s.y*CELL+CELL/2}));

  // Рисуем тело от хвоста к голове
  for(let i=n-1;i>=0;i--){
    const t=i/Math.max(n-1,1);
    const r=Math.max(3, (CELL/2-1)*(1-t*0.5));
    const {x,y}=pts[i];

    // Тень
    ctx.fillStyle='rgba(0,10,0,0.4)';
    ctx.beginPath(); ctx.ellipse(x+1,y+2,r,r*0.7,0,0,Math.PI*2); ctx.fill();

    if(i===0){
      // Голова
      const dx=dir.x, dy=dir.y;
      const rx=r+Math.abs(dx)*3, ry=r+Math.abs(dy)*3;

      // Свечение головы
      const grd=ctx.createRadialGradient(x,y,0,x,y,rx+4);
      grd.addColorStop(0,'rgba(0,255,120,0.2)');
      grd.addColorStop(1,'transparent');
      ctx.fillStyle=grd;
      ctx.beginPath(); ctx.ellipse(x,y,rx+4,ry+4,0,0,Math.PI*2); ctx.fill();

      // Тело головы
      const headGrd=ctx.createRadialGradient(x-rx*0.3,y-ry*0.3,0,x,y,rx);
      headGrd.addColorStop(0,'#88ffbb');
      headGrd.addColorStop(0.5,'#00ee77');
      headGrd.addColorStop(1,'#006633');
      ctx.fillStyle=headGrd;
      ctx.strokeStyle='#004422'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2);
      ctx.fill(); ctx.stroke();

      // Глаза
      const ex1=x+dx*5+dy*(r-3), ey1=y+dy*5-dx*(r-3);
      const ex2=x+dx*5-dy*(r-3), ey2=y+dy*5+dx*(r-3);
      [[ex1,ey1],[ex2,ey2]].forEach(([ex,ey])=>{
        ctx.fillStyle='#ccffcc';
        ctx.beginPath(); ctx.arc(ex,ey,3.5,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#111100';
        ctx.beginPath(); ctx.arc(ex+dx*0.5,ey+dy*0.5,1.8,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='white';
        ctx.beginPath(); ctx.arc(ex+dx*0.5-0.6,ey+dy*0.5-0.6,0.7,0,Math.PI*2); ctx.fill();
      });

      // Язык
      const tx=x+dx*(rx+2), ty=y+dy*(ry+2);
      ctx.strokeStyle='#ff2255'; ctx.lineWidth=2.5; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(x+dx*rx,y+dy*ry); ctx.lineTo(tx,ty); ctx.stroke();
      ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tx+dx*4+dy*3,ty+dy*4-dx*3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tx+dx*4-dy*3,ty+dy*4+dx*3); ctx.stroke();

    } else {
      // Тело
      const g=ctx.createRadialGradient(x-r*0.3,y-r*0.3,0,x,y,r);
      const c1=lerpColor('#4eff91','#074420',t*0.85);
      const c2=lerpColor('#1a6630','#041208',t);
      g.addColorStop(0,c1); g.addColorStop(1,c2);
      ctx.fillStyle=g;
      ctx.strokeStyle=lerpColor('#004422','#001108',t);
      ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fill(); ctx.stroke();

      // Чешуйки
      if(i%3===0 && r>5){
        const sr=r*0.45;
        ctx.fillStyle='rgba(0,80,40,0.4)';
        ctx.beginPath(); ctx.ellipse(x,y,sr,sr*0.6,0,0,Math.PI*2); ctx.fill();
      }

      // Хребет
      if(i>0 && i<n-1){
        ctx.strokeStyle='rgba(100,255,160,0.15)';
        ctx.lineWidth=1;
        ctx.beginPath(); ctx.arc(x,y,r*0.2,0,Math.PI*2); ctx.stroke();
      }
    }
  }
}

function lerpColor(c1,c2,t){
  const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  const r=Math.round(r1+(r2-r1)*t), g=Math.round(g1+(g2-g1)*t), b=Math.round(b1+(b2-b1)*t);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

// ── Всплывающий счёт ─────────────────────────────────────────────────────────
let popupTimer=null;
function showPopup(x,y,text){
  const el=document.getElementById('score-popup');
  el.textContent=text; el.style.left=x+'px'; el.style.top=y+'px';
  el.style.opacity='1'; el.style.transform='translateY(0)';
  el.style.transition='none';
  clearTimeout(popupTimer);
  requestAnimationFrame(()=>{
    el.style.transition='opacity .6s, transform .6s';
    el.style.opacity='0'; el.style.transform='translateY(-24px)';
  });
  popupTimer=setTimeout(()=>{el.style.opacity='0';},700);
}

// ── Конец игры ────────────────────────────────────────────────────────────────
function gameOver(){
  gameRunning=false;
  cancelAnimationFrame(animId);
  if(score>bestScore) bestScore=score;
  updateHUD();
  document.getElementById('final-score').textContent=score;
  document.getElementById('new-record').style.display=(score>0&&score===bestScore)?'block':'none';
  show('screen-dead');

  // Вибрация в Telegram
  if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
}

// ── Экраны ────────────────────────────────────────────────────────────────────
function show(id){
  document.querySelectorAll('.overlay').forEach(el=>el.classList.add('hidden'));
  const el=document.getElementById(id);
  if(el) el.classList.remove('hidden');
}
function hideOverlays(){
  document.querySelectorAll('.overlay').forEach(el=>el.classList.add('hidden'));
}

document.getElementById('btn-start').addEventListener('click',()=>{hideOverlays();startGame();});
document.getElementById('btn-restart').addEventListener('click',()=>{hideOverlays();startGame();});

// ── Управление клавиатурой ────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(!gameRunning) return;
  if(e.key==='ArrowUp'    && dir.y!==1)  nextDir={x:0,y:-1};
  if(e.key==='ArrowDown'  && dir.y!==-1) nextDir={x:0,y:1};
  if(e.key==='ArrowLeft'  && dir.x!==1)  nextDir={x:-1,y:0};
  if(e.key==='ArrowRight' && dir.x!==-1) nextDir={x:1,y:0};
});

// ── D-Pad ─────────────────────────────────────────────────────────────────────
function dpad(dx,dy){
  if(!gameRunning) return;
  if(dx===0&&dy===-1&&dir.y!==1)  nextDir={x:0,y:-1};
  if(dx===0&&dy===1 &&dir.y!==-1) nextDir={x:0,y:1};
  if(dx===-1&&dy===0&&dir.x!==1)  nextDir={x:-1,y:0};
  if(dx===1 &&dy===0&&dir.x!==-1) nextDir={x:1,y:0};
  if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

[['btn-up',0,-1],['btn-down',0,1],['btn-left',-1,0],['btn-right',1,0]].forEach(([id,dx,dy])=>{
  const btn=document.getElementById(id);
  btn.addEventListener('touchstart',e=>{e.preventDefault();dpad(dx,dy);btn.classList.add('pressed');},{passive:false});
  btn.addEventListener('touchend',()=>btn.classList.remove('pressed'));
  btn.addEventListener('mousedown',()=>dpad(dx,dy));
});

// ── Свайп ─────────────────────────────────────────────────────────────────────
let swipeX=0,swipeY=0;
canvas.addEventListener('touchstart',e=>{swipeX=e.touches[0].clientX;swipeY=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-swipeX;
  const dy=e.changedTouches[0].clientY-swipeY;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>20) dpad(1,0); else if(dx<-20) dpad(-1,0);
  } else {
    if(dy>20) dpad(0,1); else if(dy<-20) dpad(0,-1);
  }
},{passive:true});

// ── Первый рендер ─────────────────────────────────────────────────────────────
ctx.fillStyle='#080812'; ctx.fillRect(0,0,W,H);
</script>
</body>
</html>
